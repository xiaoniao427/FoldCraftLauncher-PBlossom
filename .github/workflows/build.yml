name: Android Build (Debug Sign)

on:
  workflow_dispatch:   # 仅允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 创建 local.properties（提供占位符）
      - name: Create local.properties
        run: |
          echo "key-store-password=ignored" > local.properties
          echo "curse-api-key=dummy" >> local.properties
          echo "oauth-api-key=dummy" >> local.properties
          echo "arch=all" >> local.properties

      # 确保 debug-key.jks 存在（如果仓库中没有，则生成一个临时 debug 密钥库）
      - name: Ensure debug keystore exists
        run: |
          if [ ! -f debug-key.jks ]; then
            keytool -genkey -v -keystore debug-key.jks -alias FCL-Debug -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass FCL-Debug -keypass FCL-Debug -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=DE"
          fi
          # 将 debug-key.jks 移动到上级目录（因为 signingConfig 中使用 file("../debug-key.jks")）
          mv debug-key.jks ../debug-key.jks || true

      - name: Build Debug APK
        run: ./gradlew :FCL:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FCL-Debug
          path: FCL/build/outputs/apk/debug/*.apk
