name: Android Build (Debug Sign)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 创建 local.properties（提供占位符）
      - name: Create local.properties
        run: |
          echo "key-store-password=ignored" > local.properties
          echo "curse-api-key=dummy" >> local.properties
          echo "oauth-api-key=dummy" >> local.properties
          echo "arch=all" >> local.properties

      # 从 Secrets 中恢复自定义 keystore 文件
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > mykey.jks
          # 移动到上级目录（如果项目签名配置中使用 file("../mykey.jks")）
          mv mykey.jks ../mykey.jks || true

      # 创建 gradle.properties 并写入签名配置（如果项目使用 gradle.properties 变量）
      - name: Setup signing config
        run: |
          echo "RELEASE_STORE_FILE=../mykey.jks" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

      # 构建已签名的 Release APK（使用自定义签名）
      - name: Build Release APK
        run: ./gradlew :FCL:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FCL-Debug
          path: FCL/build/outputs/apk/release/*.apk
