name: Build

on:
  pull_request:
  push:
    paths-ignore:
      - "**.md"
      - "version_map.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_build:
    if: ${{ github.repository_owner == 'FCL-Team' && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/') }}
    name: Release Build for ${{ matrix.arch }}
    strategy:
      matrix:
        arch: ["all", "arm", "arm64", "x86", "x86_64"]
      fail-fast: false
    env:
      FCL_KEYSTORE_PASSWORD: ${{ secrets.FCL_KEYSTORE_PASSWORD }}
      CURSE_API_KEY: ${{ secrets.CURSE_API_KEY }}
      OAUTH_API_KEY: ${{ secrets.OAUTH_API_KEY }}
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: "gradle"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build ${{ matrix.arch }} release APK
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload APK artifact
        if: github.ref_type == 'branch'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ matrix.arch }}
          path: FCL/build/outputs/apk/release/*.apk
          retention-days: 21

  debug_build:
    if: ${{ (github.repository_owner != 'FCL-Team' || github.event_name == 'pull_request') && !startsWith(github.ref, 'refs/tags/') }}
    name: Debug Build for ${{ matrix.arch }}
    strategy:
      matrix:
        arch: ["all", "arm", "arm64", "x86", "x86_64"]
      fail-fast: false
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: "gradle"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build ${{ matrix.arch }} debug APK
        run: |
          chmod +x gradlew
          ./gradlew assemblefordebug -Darch=${{ matrix.arch }} --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ matrix.arch }}
          path: FCL/build/outputs/apk/fordebug/*.apk
          retention-days: 21
