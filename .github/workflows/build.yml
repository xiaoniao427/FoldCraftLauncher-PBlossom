name: Build and Draft Release

on:
  push:
    tags:
      - 'v*'               # 推送 v 开头标签时触发（如 v1.0.0）
  workflow_dispatch:       # 允许手动触发
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

jobs:
  build-and-draft:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    permissions:
      contents: write      # 需要写入权限才能创建 Release 和上传资产

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: 'gradle'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build arm64 release APK
        run: |
          chmod +x gradlew
          ./gradlew assemblerelease -Darch=arm64 --no-daemon

      - name: Find APK file
        id: apk
        run: |
          APK_PATH=$(find FCL/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT

      - name: Create draft release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          name: Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          draft: true       # 草稿状态，不会正式发布
          prerelease: false
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
