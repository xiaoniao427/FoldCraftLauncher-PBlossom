name: Android Build and Draft Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许创建发行版和上传附件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties (dummy)
        run: |
          echo "key-store-password=ignored" > local.properties
          echo "curse-api-key=dummy" >> local.properties
          echo "oauth-api-key=dummy" >> local.properties
          echo "arch=all" >> local.properties

      - name: Build Debug APK
        run: ./gradlew :FCL:assembleDebug

      - name: Upload APK as artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: FCL-Debug
          path: FCL/build/outputs/apk/debug/*.apk

      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: draft-${{ github.run_number }}-${{ github.run_attempt }}
          name: "Development Build #${{ github.run_number }}"
          body: |
            Automatic development build from commit `${{ github.sha }}`.
            
            **This is a draft release.** APK is attached below.
          draft: true
          prerelease: true
          files: |
            FCL/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
